<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Tiers Clone</title>
    <style>
        /* মূল থিম এবং ব্যাকগ্রাউন্ড */
        body {
            background-color: #0d1117; /* গাঢ় কালো রঙ */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* প্লেয়ার কার্ডের ডিজাইন */
        .card {
            background-color: #161b22;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border: 1px solid #30363d;
            position: relative;
        }

        /* র‍্যাঙ্কিং নম্বর (১, ২) */
        .rank {
            font-size: 28px;
            font-style: italic;
            font-weight: bold;
            margin-right: 20px;
            color: #f0f6fc;
        }

        /* প্লেয়ারের নাম এবং ডিটেইলস */
        .player-info {
            flex-grow: 1;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #58a6ff; /* নীলচে হাইলাইট */
        }

        .region-tag {
            background-color: #f85149; /* লাল ট্যাগ */
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            float: right;
        }

        /* ছোট ছোট ট্যাগ বা টায়ারস */
        .tiers {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .tier-box {
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <h2>Overall Rankings</h2>

    <div class="card">
        <div class="rank">1.</div>
        <div class="player-info">
            <span class="region-tag">NA</span>
            <div class="player-name">ItzReal...</div>
            <div class="tiers">
                <div class="tier-box">HT3</div>
                <div class="tier-box">HT1</div>
                <div class="tier-box">LT2</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="rank">2.</div>
        <div class="player-info">
            <span class="region-tag" style="background-color: #2ea043;">EU</span>
            <div class="player-name">coldified</div>
            <div class="tiers">
                <div class="tier-box">LT1</div>
                <div class="tier-box">HT2</div>
                <div class="tier-box">HT1</div>
            </div>
        </div>
    </div>

</body>
</html>
