<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BMCSERVER - Minecraft Server List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BMCSERVER</h1>
        <nav>
            <a href="#">New Servers</a> | <a href="#">Add Server</a> | <a href="#">Login</a>
        </nav>
    </header>

    <main>
        <section class="server-table">
            <div class="table-header">
                <span>Rank</span>
                <span>Server</span>
                <span>IP Address</span>
            </div>
            
            <!-- একটি ডেমো সার্ভার রো -->
            <div class="server-row">
                <div class="rank">#1</div>
                <div class="details">
                    <h3>Example Server Name</h3>
                    <p>এটি একটি চমৎকার সার্ভার ডেসক্রিপশন।</p>
                </div>
                <div class="ip-section">
                    <span class="ip">play.example.com</span>
                    <button onclick="copyIP('play.example.com')">Copy IP</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
