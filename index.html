<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCBDTRLIST</title>
    <style>
        body {
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ওয়েবসাইট এবং সার্ভারের নাম স্টাইল */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }
        .site-title {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            margin: 0;
        }
        .server-name {
            font-size: 14px;
            color: #8b949e;
            background: #21262d;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
            border: 1px solid #30363d;
        }

        .card {
            background: #161b22;
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .rank {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            margin-right: 15px;
            color: #f0f6fc;
            min-width: 35px;
        }

        .player-content {
            flex-grow: 1;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .player-name {
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
        }

        .region-tag {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 3px;
            background-color: #f85149;
            color: white;
        }

        .tiers-row {
            display: flex;
            gap: 6px;
        }

        .tier-icon {
            width: 32px;
            height: 32px;
            background-color: #21262d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #ec775c;
            border: 1px solid #444c56;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="site-title">MCBDTRLIST</h1>
        <div class="server-name">SERVER: UNSTABLEBD</div>
        <div class="server-ip">ip:dragon.senxcloud.com:5034</div>
    </div>

    <div class="card">
        <div class="rank">1.</div>
        <div class="player-content">
            <div class="player-header">
                <div class="player-name">Player Name 1</div>
                <span class="region-tag">BD</span>
            </div>
            <div class="tiers-row">
                <div class="tier-icon">HT1</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="rank">2.</div>
        <div class="player-content">
            <div class="player-header">
                <div class="player-name">Player Name 2</div>
                <span class="region-tag">BD</span>
            </div>
            <div class="tiers-row">
                <div class="tier-icon">LT1</div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="rank">3.</div>
        <div class="player-content">
            <div class="player-header">
                <div class="player-name">Player Name 3</div>
                <span class="region-tag">BD</span>
            </div>
            <div class="tiers-row">
                <div class="tier-icon">LT3</div>
            </div>
        </div>
</div>
    
</body>
</html>
